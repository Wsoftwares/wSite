<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>White Softwares</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:white;
  color:#111;
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* PARTICULAS */
#particles-js{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
  background:white;
}

/* HEADER */
header{
  background:#4169E1;
  color:white;
  padding:20px 25px;
  font-size:32px;
  font-weight:bold;
  position:relative;
  text-align:center;
}

/* CARD DISCORD */
.discord-card{
  position:absolute;
  top:15px;
  right:20px;
  width:50px;
  background:white;
  border-radius:6px;
  overflow:hidden;
  box-shadow:0 0 6px rgba(0,0,0,0.2);
  text-align:center;
  z-index:2;
}

.discord-card img{
  width:100%;
  height:45px;
  object-fit:cover;
}

.discord-card a{
  display:block;
  background:#4169E1;
  color:white;
  text-decoration:none;
  padding:4px;
  font-weight:bold;
  font-size:10px;
}

/* MENU */
nav{
  display:flex;
  justify-content:center;
  gap:40px;
  background:#2e52c2;
  padding:12px;
  flex-wrap:wrap;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:bold;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:50px 20px;
  flex:1;
}

/* TITULO DA SEÇÃO */
.title{
  text-align:center;
  margin-bottom:50px;
}

.title h1{
  font-size:40px;
  color:#4169E1;
}

/* CARDS - FLEXBOX */
.cards{
  display:flex;
  justify-content:center;
  gap:40px;
  flex-wrap:wrap; /* só empilha em telas muito pequenas */
}

.card{
  flex: 1 1 400px; /* força 2 cards lado a lado */
  max-width:400px;
  border:3px solid #4169E1;
  border-radius:12px;
  overflow:hidden;
  background:white;
  text-align:center;
  transition:0.25s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

/* TEXTO */
.card-content{
  padding:25px;
}

.card-content h2{
  font-size:28px;
  margin-bottom:10px;
}

/* BOTÃO */
.btn{
  display:inline-block;
  margin-top:15px;
  background:#4169E1;
  color:white;
  padding:14px 28px;
  border-radius:8px;
  text-decoration:none;
  font-size:18px;
  font-weight:bold;
}

.btn:hover{
  background:#2e52c2;
}

/* FOOTER */
footer{
  background:#4169E1;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:auto;
}

/* MOBILE */
@media(max-width:600px){
  .cards{
    flex-direction:column;
    align-items:center;
  }
  .title h1{
    font-size:32px;
  }
  .discord-card{
    width:40px;
  }
}
</style>
</head>

<body>

<div id="particles-js"></div>

<header>
  White Softwares
  <div class="discord-card">
    <img src="discord.jpg" alt="Discord">
    <a href="https://discord.gg/ZhT2fgQtBN" target="_blank">Discord</a>
  </div>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#downloads">Downloads</a>
</nav>

<div class="container">

<div class="title">
  <h1 id="downloads">Downloads</h1>
  <p>Selecione o software que deseja baixar</p>
</div>

<div class="cards">
  <!-- Free Fire -->
  <div class="card">
    <img src="freefire.jpg" alt="Free Fire Cheat">
    <div class="card-content">
      <h2>Free Fire Cheat</h2>
      <p>Versão mais recente</p>
      <a class="btn" href="https://github.com/Wsoftwares/drive/archive/refs/tags/v1.1.zip">Download</a>
    </div>
  </div>

  <!-- CS2 -->
  <div class="card">
    <img src="cs2.jpg" alt="CS2 Cheat">
    <div class="card-content">
      <h2>CS2 Cheat</h2>
      <p>Versão mais recente</p>
      <a class="btn" href="https://github.com/Wsoftwares/inject/archive/refs/tags/v1.1.zip">Download</a>
    </div>
  </div>
</div>

</div>

<footer>
  
</footer>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS("particles-js",{
  "particles":{
    "number":{"value":80},
    "color":{"value":"#4169E1"},
    "shape":{"type":"circle"},
    "opacity":{"value":0.5},
    "size":{"value":3},
    "line_linked":{
      "enable":true,
      "distance":150,
      "color":"#4169E1",
      "opacity":0.4,
      "width":1
    },
    "move":{
      "enable":true,
      "speed":2
    }
  },
  "interactivity":{
    "events":{
      "onhover":{
        "enable":true,
        "mode":"grab"
      }
    }
  },
  "retina_detect":true
});
</script>

</body>
</html>
